datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:healthe_global}
    driverClassName: org.postgresql.Driver
    schema-generate: NONE
flyway:
  datasources:
    default:
      enabled: true
      baselineOnMigrate: true
      hikari:
        maximumPoolSize: ${DB_MAX_POOL_SIZE:10}
        minimumIdle: ${DB_MIN_IDLE:10}
jpa.default.properties.hibernate:
  hbm2ddl.auto: none
  format_sql: true
endpoints:
  health:
    enabled: true
    sensitive: false