micronaut:
  server:
    port: ${PORT:8080}
  application:
    name: backend
  security:
    authentication: bearer
    basic-auth:
      enabled: false
    redirect:
      enabled: false
      forbidden:
        enabled: false
      unauthorized:
        enabled: false
    endpoints:
      login:
        enabled: true
        path: /login
    token:
      jwt:
        generator:
          access-token:
            expiration: 604800
        signatures:
          secret:
            generator:
              secret: ${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}
              jws-algorithm: HS256
    intercept-url-map:
      - access: isAnonymous()
        pattern: /login
      - access: isAnonymous()
        pattern: /swagger/**
      - access: isAnonymous()
        pattern: /swagger-ui/**
      - access: isAnonymous()
        pattern: /api/v1/device/**
      - access: device
        pattern: /api/v1_2/device/**
      - access: isAnonymous()
        pattern: /static/firmware/**
      - access: isAnonymous()
        pattern: /help/**
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
      firmware:
        enabled: true
        mapping: '/static/firmware/**'
        paths: classpath:firmware
      help:
        enabled: true
        mapping: /help/**
        paths: classpath:help
datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pillorganizer}
    driverClassName: org.postgresql.Driver
    schema-generate: NONE
jpa.default.properties.hibernate:
  hbm2ddl.auto: none
  format_sql: true
netty:
  default:
    allocator:
      max-order: 3
flyway:
  datasources:
    default:
      enabled: true
      baselineOnMigrate: true
      hikari:
        maximumPoolSize: ${DB_MAX_POOL_SIZE:10}
        minimumIdle: ${DB_MIN_IDLE:10}
firebase:
  privkey: ${FIREBASE_PRIVATE_KEY}
  project: ${FIREBASE_PROJECT_ID}
  email: ${FIREBASE_CLIENT_EMAIL}
sendgrid:
  api-key: ${SENDGRID_API_KEY}
email:
  sender: ${SENDGRID_SENDER}
takecare:
  api:
    url: ${TAKECARE_API_URL:https://ca.takecareapi.com}
    token: ${TAKECARE_API_TOKEN}
