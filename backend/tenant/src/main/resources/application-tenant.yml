micronaut:
  server:
    port: ${PORT:8080}
  application:
    name: pillorganizer-backend
  multitenancy:
    propagation:
      enabled: true
      service-id-regex: ".*"
    tenantwriter:
      httpheader:
        enabled: true
        header-name: "x-tenant-id"
  security:
    intercept-url-map:
      - access: isAnonymous()
        pattern: /swagger/**
      - access: isAnonymous()
        pattern: /swagger-ui/**
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**
datasources:
  default:
    url: jdbc:aws-dsql:postgresql://${DB_HOST}/postgres?sslmode=verify-full
    driverClassName: software.amazon.dsql.jdbc.DSQLConnector
    schema-generate: NONE
    allow-pool-suspension: true
    maximum-pool-size: 3
    minimum-idle: 0
    idle-timeout: 10000
    max-lifetime: 30000
    username: admin
flyway:
  datasources:
    default:
      enabled: false
      baselineOnMigrate: true
      hikari:
        maximumPoolSize: ${DB_MAX_POOL_SIZE:10}
        minimumIdle: ${DB_MIN_IDLE:10}
takecare:
  api:
    url: ${TAKECARE_API_URL:https://ca.takecareapi.com}
    token: ${TAKECARE_API_TOKEN}
