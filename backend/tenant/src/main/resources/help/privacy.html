<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CabiNET</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        background-color: #fff;
      }

      .text-container {
        margin-top: 15%;
        background-color: #fff;
        width: 50%;
        padding: 50px;
        display: flex;
        flex-direction: column;
      }

      h1,
      p {
        color: #000;
        margin: 0;
      }

      h1 {
        font-size: 3em;
        margin-bottom: 0.5em;
      }

      h2 {
        font-size: 2em;
      }

      p {
        font-size: 1.5em;
        line-height: 1.5;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="text-container">
      <h1>CabiNET</h1>
      <h2>Privacy</h2>
      <p>In maintenance, please come back later.</p>
    </div>
  </body>
</html>
