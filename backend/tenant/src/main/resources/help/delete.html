<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CabiNET</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        background-color: #fff;
      }

      .image-container {
        background-image: url("https://images.unsplash.com/photo-1573883429746-084be9b5cfca?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
        background-size: cover;
        background-position: center;
        width: 50%;
        height: 100%;
      }

      .text-container {
        margin-top: 15%;
        background-color: #fff;
        width: 50%;
        padding: 50px;
        display: flex;
        flex-direction: column;
      }

      h1,
      p {
        color: #000;
        margin: 0;
      }

      h1 {
        font-size: 3em;
        margin-bottom: 0.5em;
      }

      h2 {
        font-size: 2em;

      }

      p {
        font-size: 1.5em;
        line-height: 1.5;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="text-container">
      <h1>CabiNET</h1>
      <h2>Delete Account</h2>
      <p>
        To delete your account, please send an email to our support at <a href="mailto:antoine@t-b.ca" title="Delete my account">CabiNET</a>
      </p>
    </div>
    <div class="image-container">
      <!-- Image is displayed here -->
    </div>
  </body>
</html>
