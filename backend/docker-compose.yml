version: '3.8'
services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566" # SQS
      - "1883:1883" # MQTT - IoT Core
    environment:
      - SERVICES=sqs,iot,secretsmanager,dynamodb
      - ALLOW_NONSTANDARD_REGIONS=1
      - DYNAMODB_SHARE_DB=1
    volumes:
      - ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
  postgres:
    image: postgres:17.7
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: "pillorganizer"