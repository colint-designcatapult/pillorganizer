version: '3.8'
services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566" # SQS
      - "1883:1883" # MQTT - IoT Core
    environment:
      - SERVICES=sqs,iot,secretsmanager
    volumes:
      - ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
  postgres:
    image: postgres:17.7
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_MULTIPLE_DATABASES: "pillorganizer,healthe_global"
    volumes:
      - ./create-databases.sh:/docker-entrypoint-initdb.d/create-databases.sh