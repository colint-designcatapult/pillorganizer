name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.2+90)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          ref: master

      - name: Extract version from input
        id: vars
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Update pubspec.yaml
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          sed -i "s/^version: .*/version: ${VERSION}/" app/pubspec.yaml
          echo "Updated pubspec.yaml to version: ${VERSION}"
          cat app/pubspec.yaml | head -20

      - name: Get commit history for changelog
        id: changelog
        run: |
          # Get the most recent tag (excluding current HEAD if tagged)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            echo "First release detected, getting all commits"
            COMMIT_LOG=$(git log --oneline --pretty=format:"- %h: %s")
          else
            # Get commits since previous tag
            echo "Previous tag: ${PREV_TAG}, getting commits since then"
            COMMIT_LOG=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          
          # Store in output (handle multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "release/${{ steps.vars.outputs.version }}"
          title: "Release ${{ steps.vars.outputs.version }}"
          body: |
            ## Automated Release PR
            
            **Version:** `${{ steps.vars.outputs.version }}`
            
            ### Changes Since Last Release
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
            
            ### What This Does
            - Updates app version in `app/pubspec.yaml`
            - Creates audit trail in PR
            - Ready for manual merge when approved
            
            **Next Steps:**
            1. Review the version change
            2. Approve this PR
            3. Merge when ready
            
            ---
            *This PR was automatically generated by GitHub Actions*
          base: master
          commit-message: "feat: bump app version to ${{ steps.vars.outputs.version }}"
          labels: |
            release
            automated
          reviewers: ${{ github.actor }}
