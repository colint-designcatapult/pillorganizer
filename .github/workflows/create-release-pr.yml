name: Create Release PR

on:
  push:
    tags:
      - '[0-9]*'
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3+90 or v1.2.3+90)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag or input
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger - use input version
            TAG="${{ github.event.inputs.version }}"
          else
            # Tag push - extract from git ref
            TAG=${GITHUB_REF#refs/tags/}
          fi
          # Remove 'v' prefix if present (works whether v is there or not)
          VERSION=${TAG#v}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Tag: ${TAG}"
          echo "Version: ${VERSION}"

      - name: Update pubspec.yaml
        run: |
          VERSION=${{ steps.vars.outputs.version }}
          sed -i "s/^version: .*/version: ${VERSION}/" app/pubspec.yaml
          echo "Updated pubspec.yaml to version: ${VERSION}"
          cat app/pubspec.yaml | head -20

      - name: Get commit history for changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 @^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            # First release - get all commits
            COMMIT_LOG=$(git log --oneline --pretty=format:"- %h: %s")
          else
            # Get commits since previous tag
            COMMIT_LOG=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          
          # Store in output (handle multiline)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "release/${{ steps.vars.outputs.tag }}"
          title: "Release ${{ steps.vars.outputs.tag }}"
          body: |
            ## Automated Release PR
            
            **Version:** `${{ steps.vars.outputs.version }}`
            
            **Tag:** `${{ steps.vars.outputs.tag }}`
            
            ### Changes Since Last Release
            ```
            ${{ steps.changelog.outputs.changelog }}
            ```
            
            ### What This Does
            [*] Updates app version in `app/pubspec.yaml`
            [*] Creates audit trail in PR
            [*] Ready for manual merge when approved
            
            **Next Steps:**
            1. Review the version change
            2. Approve this PR
            3. Merge when ready
            
            ---
            *This PR was automatically generated by GitHub Actions*
          base: master
          commit-message: "feat: bump app version to ${{ steps.vars.outputs.version }}"
          labels: |
            release
            automated
          reviewers: ${{ github.actor }}
