name: Deploy Backend to AWS

on:
  push:
    branches:
      - 'master'
      - 'production'
    paths:
      - '.github/workflows/deploy-aws.yml'
      - 'backend/**'
      - 'terraform/**'
  pull_request:
    branches:
      - 'master'
      - 'production'
    paths:
      - '.github/workflows/deploy-aws.yml'
      - 'backend/**'
      - 'terraform/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: ca-central-1

jobs:
  # Determine environment based on branch or manual input
  determine-environment:
    name: Determine Deployment Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      deploy: ${{ steps.env.outputs.deploy }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/production" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  # Compile and test (reusing from existing workflow)
  compile-and-test:
    name: Compile and Test with Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      - name: Compile and Test with Maven
        run: |
          cd backend
          mvn --batch-mode --update-snapshots test

  # Deploy to AWS
  deploy-aws:
    name: Deploy to AWS (${{ needs.determine-environment.outputs.environment }})
    runs-on: ubuntu-latest
    needs: [compile-and-test, determine-environment]
    if: needs.determine-environment.outputs.deploy == 'true'
    environment: ${{ needs.determine-environment.outputs.environment }}

    # These permissions are needed for OIDC authentication
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      # Environment variables are automatically available from GitHub environments
      # No need to set them manually - they're inherited from the environment context

      - name: Debug OIDC Token Claims
        run: |
          echo "=== OIDC Debug Information ==="
          echo "Repository: ${{ github.repository }}"
          echo "Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "Ref: ${{ github.ref }}"
          echo "Expected sub claim: repo:${{ github.repository }}:environment:${{ needs.determine-environment.outputs.environment }}"
          echo "Role ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-${{ vars.GITHUB_REPOSITORY_NAME || 'cabinet' }}-${{ needs.determine-environment.outputs.environment }}"
          echo "=============================="

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-${{ vars.GITHUB_REPOSITORY_NAME || 'cabinet' }}-${{ needs.determine-environment.outputs.environment }}
          role-session-name: GitHubActions-Deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '>= 1.0'
          terraform_wrapper: false

      - name: Set environment variables
        run: |
          echo "ENVIRONMENT=${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ needs.determine-environment.outputs.environment }}-${{ github.sha }}" >> $GITHUB_ENV

      # Initialize Terraform and get ECR repository URL
      - name: Initialize Terraform
        run: |
          cd terraform
          terraform init
          terraform workspace select ${{ env.ENVIRONMENT }} || terraform workspace new ${{ env.ENVIRONMENT }}

      - name: Get ECR repository URL
        id: ecr
        run: |
          cd terraform
          # For first deployment, always use constructed ECR URL since Terraform hasn't created it yet
          echo "⚠️  First deployment - using constructed ECR URL"
          ECR_URL="${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/cabinet"
          echo "📦 Using ECR URL: $ECR_URL"
          echo "repository_url=$ECR_URL" >> $GITHUB_OUTPUT

      # Build and push Docker image
      - name: Build application JAR with Maven
        run: |
          cd backend
          mvn --batch-mode --update-snapshots clean package -DskipTests

      - name: Build Docker image
        run: |
          cd backend
          docker build -t backend:latest .

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        run: |
          # Build image
          cd backend
          docker build -t backend .

          # Tag for ECR
          docker tag backend:latest ${{ steps.ecr.outputs.repository_url }}:${{ env.IMAGE_TAG }}
          docker tag backend:latest ${{ steps.ecr.outputs.repository_url }}:${{ env.ENVIRONMENT }}-latest

          # Create ECR repository if it doesn't exist
          aws ecr describe-repositories --repository-names cabinet --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name cabinet --region ${{ env.AWS_REGION }}

          # Push images
          docker push ${{ steps.ecr.outputs.repository_url }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.ecr.outputs.repository_url }}:${{ env.ENVIRONMENT }}-latest

      # Plan and apply Terraform
      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -var-file="terraform.${{ env.ENVIRONMENT }}.tfvars" -out=${{ env.ENVIRONMENT }}.tfplan
        continue-on-error: true

      - name: Update Pull Request with Plan
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const output = `#### Terraform Plan 📖 (${{ env.ENVIRONMENT }})
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ env.PLAN }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/production' || github.event_name == 'workflow_dispatch'
        run: |
          cd terraform
          echo "⚠️ Skipping Terraform apply - infrastructure already exists"
          echo "Will update ECS service directly with new container image"
          # terraform apply -auto-approve ${{ env.ENVIRONMENT }}.tfplan

      # Force ECS service update to pull new image
      - name: Update ECS Service
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/production' || github.event_name == 'workflow_dispatch'
        run: |
          # Use known resource names since infrastructure already exists
          CLUSTER_NAME="cabinet-${{ env.ENVIRONMENT }}-cluster"
          SERVICE_NAME="cabinet-${{ env.ENVIRONMENT }}-service"

          echo "🚀 Updating ECS service: $SERVICE_NAME in cluster: $CLUSTER_NAME"

          # Check if cluster and service exist first
          if aws ecs describe-clusters --clusters $CLUSTER_NAME --region ${{ env.AWS_REGION }} | grep -q "ACTIVE"; then
            echo "✅ Found ECS cluster: $CLUSTER_NAME"
            
            if aws ecs describe-services --cluster $CLUSTER_NAME --services $SERVICE_NAME --region ${{ env.AWS_REGION }} | grep -q "ACTIVE"; then
              echo "✅ Found ECS service: $SERVICE_NAME"
              
              echo "🔄 Forcing new deployment with latest container image..."
              aws ecs update-service \
                --cluster $CLUSTER_NAME \
                --service $SERVICE_NAME \
                --force-new-deployment \
                --region ${{ env.AWS_REGION }}

              echo "⏳ Waiting for deployment to complete..."
              aws ecs wait services-stable \
                --cluster $CLUSTER_NAME \
                --services $SERVICE_NAME \
                --region ${{ env.AWS_REGION }}
              
              echo "🎉 Deployment completed successfully!"
            else
              echo "❌ ECS service $SERVICE_NAME not found"
              exit 1
            fi
          else
            echo "❌ ECS cluster $CLUSTER_NAME not found"
            exit 1
          fi

      # Get deployment outputs
      - name: Get Deployment Outputs
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/production' || github.event_name == 'workflow_dispatch'
        run: |
          echo "### 🚀 ECS Service Update Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "**ECS Cluster:** cabinet-${{ env.ENVIRONMENT }}-cluster" >> $GITHUB_STEP_SUMMARY
          echo "**ECS Service:** cabinet-${{ env.ENVIRONMENT }}-service" >> $GITHUB_STEP_SUMMARY
          echo "**ECR Repository:** ${{ steps.ecr.outputs.repository_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image:** ${{ steps.ecr.outputs.repository_url }}:${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CloudWatch Logs:** https://console.aws.amazon.com/cloudwatch/home?region=${{ env.AWS_REGION }}#logsV2:log-groups/log-group/%2Fecs%2Fcabinet-${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ **Note:** Skipped Terraform apply since infrastructure already exists." >> $GITHUB_STEP_SUMMARY

  # Cleanup old images
  cleanup-images:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: [deploy-aws, determine-environment]
    if: always() && needs.deploy-aws.result == 'success'

    # These permissions are needed for OIDC authentication
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set environment-specific variables
        run: |
          if [ "${{ needs.determine-environment.outputs.environment }}" == "staging" ]; then
            echo "AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID_STAGING || secrets.AWS_ACCOUNT_ID_PRODUCTION }}" >> $GITHUB_ENV
          else
            echo "AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID_PRODUCTION || secrets.AWS_ACCOUNT_ID_PRODUCTION }}" >> $GITHUB_ENV
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}:role/GitHubActions-${{ vars.GITHUB_REPOSITORY_NAME || 'cabinet' }}-${{ needs.determine-environment.outputs.environment }}
          role-session-name: GitHubActions-Cleanup-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Clean up old ECR images
        run: |
          # Keep last 10 images per environment
          aws ecr list-images \
            --repository-name cabinet \
            --filter tagStatus=TAGGED \
            --query 'imageIds[?starts_with(imageTag, `${{ needs.determine-environment.outputs.environment }}-`) && imageTag != `${{ needs.determine-environment.outputs.environment }}-latest`]' \
            --output json | \
          jq -r 'sort_by(.imageTag) | reverse | .[10:] | .[] | .imageDigest' | \
          while read digest; do
            if [ ! -z "$digest" ] && [ "$digest" != "null" ]; then
              echo "Deleting old image with digest: $digest"
              aws ecr batch-delete-image \
                --repository-name cabinet \
                --image-ids imageDigest=$digest || true
            fi
          done
