name: control-plane

on:
  push:
    branches:
      - 'master'
    paths:
      - '.github/workflows/control-plane.yml'
      - 'backend/global/**'
      - 'backend/pom.xml'
      - 'infra/lib/control-plane-stack.ts'
  pull_request:
    branches:
      - 'master'
    paths:
      - '.github/workflows/control-plane.yml'
      - 'backend/global/**'
      - 'backend/pom.xml'
      - 'infra/lib/control-plane-stack.ts'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Compile and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'
      
      - name: Compile and Package
        working-directory: backend
        env:
          MAVEN_OPTS: "-Xmx1024m"
        run: mvn --batch-mode --update-snapshots clean package -pl global -am

      - name: Upload Artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: global-jar
          path: backend/global/target/global-0.1.jar
          retention-days: 1

  deploy:
    name: Deploy Control Plane
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v3
      
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: global-jar
          path: backend/global/target

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::114829892869:role/GitHubActionDeployRole
          aws-region: ca-central-1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install CDK dependencies
        working-directory: infra
        run: |
          npm install -g aws-cdk
          pnpm install

      - name: Deploy
        working-directory: infra
        run: |
          # Deploying to staging environment as per backend.yml pattern
          cdk deploy HealtheControlPlaneStack --require-approval never --exclusively
