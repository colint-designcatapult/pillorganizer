# This is a basic workflow to help you get started with Actions
name: backend

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches:
      - 'master'
    paths:
      - 'backend/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-backend:
    name: backend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Compile and Test with Maven
        run: mvn --batch-mode --update-snapshots test
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package -Dpackaging=docker
      - name: push image to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:login
          docker tag backend registry.heroku.com/jctbackend/web
          docker push registry.heroku.com/jctbackend/web
          heroku container:release web -a jctbackend