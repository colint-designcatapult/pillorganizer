name: backend

on:
  push:
    branches:
      - 'master'
    paths:
      - '.github/workflows/backend.yml'
      - 'backend/**'
  pull_request:
    branches:
      - 'master'
    paths:
      - '.github/workflows/backend.yml'
      - 'backend/**'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  compile-and-test:
    name: Compile and Test with Maven and build container image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'
      
      - name: Compile and Test with Maven
        working-directory: backend
        env:
          MAVEN_OPTS: "-Xmx1024m"
        run: mvn --batch-mode --update-snapshots clean compile test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::114829892869:role/GitHubActionDeployRole
          aws-region: ca-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        id: build-image
        working-directory: backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: pillorganizer-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # todo: change this for prod/staging
          ENV="staging"
          mvn --batch-mode jib:build \
            -Djib.to.image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -Djib.to.tags=latest,$ENV \
            -Djib.to.auth.username=AWS \
            -Djib.to.auth.password=${{ steps.login-ecr.outputs.docker_password }}
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT
  
  deploy-ecs:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: compile-and-test
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::114829892869:role/GitHubActionDeployRole
          aws-region: ca-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch Infrastructure Config
        id: fetch-config
        run: |
          # todo: change this for prod/staging
          ENV="staging"
          
          echo "Fetching config for environment: $ENV"
          
          CLUSTER=$(aws ssm get-parameter --name "/pillorganizer/$ENV/backend/cluster-name" --query "Parameter.Value" --output text)
          SERVICE=$(aws ssm get-parameter --name "/pillorganizer/$ENV/backend/service-name" --query "Parameter.Value" --output text)
          CONTAINER=$(aws ssm get-parameter --name "/pillorganizer/$ENV/backend/container-name" --query "Parameter.Value" --output text)
          
          echo "Found Service: $SERVICE"
          
          echo "cluster_name=$CLUSTER" >> $GITHUB_OUTPUT
          echo "service_name=$SERVICE" >> $GITHUB_OUTPUT
          echo "container_name=$CONTAINER" >> $GITHUB_OUTPUT

      - name: Download Task Definition
        run: |
          # Get current Task Def ARN from the Service
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ steps.fetch-config.outputs.cluster_name }} \
            --services ${{ steps.fetch-config.outputs.service_name }} \
            --query "services[0].taskDefinition" \
            --output text)
            
          aws ecs describe-task-definition --task-definition $TASK_DEF_ARN --query taskDefinition > task-definition.json

      - name: Render New Task Definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ steps.fetch-config.outputs.container_name }}
          image: ${{ needs.compile-and-test.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ steps.fetch-config.outputs.service_name }}
          cluster: ${{ steps.fetch-config.outputs.cluster_name }}
          wait-for-service-stability: true