name: backend

on:
  push:
    branches:
      - "master"
    paths:
      - ".github/workflows/backend.yml"
      - "backend/**"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/backend.yml"
      - "backend/**"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  compile-and-test:
    name: Compile and Test with Maven
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "adopt"
      - name: Compile and Test with Maven
        run: mvn --batch-mode --update-snapshots test

  build-with-maven:
    name: Build with Maven
    runs-on: ubuntu-latest
    needs: compile-and-test
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "adopt"
      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots package -Dpackaging=docker

  push-to-heroku:
    name: Push image to Heroku
    runs-on: ubuntu-latest
    needs: build-with-maven
    if: github.event.pull_request.merged == true
    steps:
      - name: Login to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:login
          docker tag backend registry.heroku.com/jctbackend/web
          docker push registry.heroku.com/jctbackend/web
          heroku container:release web -a jctbackend
