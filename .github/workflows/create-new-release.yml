name: Create New Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.0.1)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  create-new-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          ref: master

      - name: Extract version from input
        id: vars
        run: |
          BASE_VERSION="${{ github.event.inputs.version }}"
          RUN_NUMBER="${{ github.run_number }}"
          BUILD_NUMBER=$((RUN_NUMBER + 1000))
          APP_VERSION="${BASE_VERSION}+${BUILD_NUMBER}"
          BRANCH_VERSION=$(echo "${APP_VERSION}" | sed 's/[.+]/-/g')
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "branch_version=${BRANCH_VERSION}" >> $GITHUB_OUTPUT

      - name: Update app and firmware versions
        run: |
          APP_VERSION=${{ steps.vars.outputs.app_version }}
          BASE_VERSION=${{ steps.vars.outputs.base_version }}
          echo "Updating pubspec.yaml to: ${APP_VERSION}"
          sed -i "s/^version: .*/version: ${APP_VERSION}/" app/pubspec.yaml
          echo "Updated pubspec.yaml:"
          grep "^version:" app/pubspec.yaml
          echo ""
          echo "Updating CMakeLists.txt to: ${BASE_VERSION}"
          sed -i "s/^set(PROJECT_VER .*/set(PROJECT_VER \"${BASE_VERSION}\")/" firmware/CMakeLists.txt
          echo "Updated CMakeLists.txt:"
          grep "PROJECT_VER" firmware/CMakeLists.txt

      - name: Get commit history for changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            COMMIT_LOG=$(git log --oneline --pretty=format:"- %h: %s")
          else
            COMMIT_LOG=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create and push release branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b "release/${{ steps.vars.outputs.branch_version }}"
          git add app/pubspec.yaml firmware/CMakeLists.txt
          git commit -m "feat: bump versions - app to ${{ steps.vars.outputs.app_version }}, firmware to ${{ steps.vars.outputs.base_version }}"
          git push -u origin "release/${{ steps.vars.outputs.branch_version }}"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "${{ steps.vars.outputs.app_version }}" -m "Release ${{ steps.vars.outputs.app_version }}"
          git push origin "${{ steps.vars.outputs.app_version }}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.vars.outputs.app_version }}';
            const branchVersion = '${{ steps.vars.outputs.branch_version }}';
            const releaseTitle = 'v' + version;
            
            github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: releaseTitle,
              target_commitish: 'release/' + branchVersion,
              generate_release_notes: true
            });

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: stable

      - name: Checkout release branch
        run: |
          git fetch origin
          git checkout "release/${{ steps.vars.outputs.branch_version }}"

      - name: Get Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Run build runner
        working-directory: app
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Android App Bundle
        working-directory: app
        run: flutter build appbundle --release

      - name: Upload App Bundle to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.vars.outputs.app_version }}
          files: app/build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "Release workflow completed successfully"
          echo "Base Version: ${{ steps.vars.outputs.base_version }}"
          echo "App Version: ${{ steps.vars.outputs.app_version }}"
          echo "Build Number: ${{ github.run_number + 1000 }}"
          echo "Branch: release/${{ steps.vars.outputs.branch_version }}"
          echo "Tag: ${{ steps.vars.outputs.app_version }}"
          echo "Release: v${{ steps.vars.outputs.app_version }}"
          echo ""
          echo "Files updated:"
          echo "- app/pubspec.yaml: version: ${{ steps.vars.outputs.app_version }}"
          echo "- firmware/CMakeLists.txt: PROJECT_VER \"${{ steps.vars.outputs.base_version }}\""
          echo ""
          echo "Artifacts created:"
          echo "- Release branch: release/${{ steps.vars.outputs.branch_version }}"
          echo "- Git tag: ${{ steps.vars.outputs.app_version }}"
          echo "- GitHub Release: v${{ steps.vars.outputs.app_version }} (with auto-generated notes)"
          echo "- Android App Bundle: app-release.aab (uploaded to release)"

      - name: Failure Cleanup - Delete GitHub Release
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.vars.outputs.app_version }}';
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id
              });
              console.log('Deleted release: ' + version);
            } catch (error) {
              console.log('Release not found or already deleted');
            }

      - name: Failure Cleanup - Delete Git Tag
        if: failure()
        run: |
          git push origin --delete "${{ steps.vars.outputs.app_version }}" || true
          echo "Deleted tag: ${{ steps.vars.outputs.app_version }}"

      - name: Failure Cleanup - Delete Release Branch
        if: failure()
        run: |
          git push origin --delete "release/${{ steps.vars.outputs.branch_version }}" || true
          echo "Deleted branch: release/${{ steps.vars.outputs.branch_version }}"


